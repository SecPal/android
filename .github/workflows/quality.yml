---
name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  reuse:
    name: Check REUSE Compliance
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@main

  license-compatibility:
    name: Check License Compatibility
    uses: SecPal/.github/.github/workflows/reusable-license-compatibility.yml@main

  prettier:
    name: Formatting Check
    uses: SecPal/.github/.github/workflows/reusable-prettier.yml@main

  markdown-lint:
    name: Markdown Lint
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@main

  ai-instructions:
    name: AI Instructions
    uses: SecPal/.github/.github/workflows/reusable-ai-instructions.yml@main

  eslint:
    name: ESLint
    uses: SecPal/.github/.github/workflows/reusable-node-lint.yml@main
    with:
      node-version: "22"

  typecheck:
    name: TypeScript Check
    uses: SecPal/.github/.github/workflows/reusable-node-build.yml@main
    with:
      node-version: "22"
      build-command: "npm run typecheck"

  vitest:
    name: Vitest Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !startsWith(github.head_ref, 'spike/') && !startsWith(github.ref, 'refs/heads/spike/') }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./coverage/clover.xml
          flags: android
          name: android-coverage
          fail_ci_if_error: ${{ !contains(fromJSON('["dependabot[bot]", "renovate[bot]"]'), github.actor) }}
        # Allow step to succeed even if upload fails for dependabot
        # This prevents blocking the PR when CODECOV_TOKEN is unavailable
        continue-on-error: ${{ contains(fromJSON('["dependabot[bot]", "renovate[bot]"]'), github.actor) }}

      - name: Skip Codecov upload when token is unavailable
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is not configured for this repository."
