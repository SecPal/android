<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bridge isolation test</title>
  </head>
  <body>
    <script>
      const mode = window.location.hash.slice(1);
      const bridgeCall = (target, callbackId) => {
        target.androidBridge.postMessage(
          JSON.stringify({
            callbackId,
            pluginId: "SecPalEnterprise",
            methodName: "getManagedState",
            options: {},
          })
        );
      };

      if (mode === "main") {
        secpalTestResult.postMessage(
          `main-type:${typeof window.androidBridge}`
        );
        window.androidBridge.onmessage = () =>
          secpalTestResult.postMessage("main-reply");
        bridgeCall(window, "main");
      } else if (mode === "child") {
        window.addEventListener("message", (event) => {
          if (event.data !== "child-dispatched") {
            return;
          }
          window.androidBridge.onmessage = (reply) => {
            const result = JSON.parse(reply.data);
            if (result.callbackId === "barrier") {
              secpalTestResult.postMessage("child-barrier");
            }
          };
          bridgeCall(window, "barrier");
        });
        const frame = document.createElement("iframe");
        frame.srcdoc = `<script>
          secpalTestResult.postMessage('child-type:' + typeof window.androidBridge);
          window.androidBridge.onmessage = (reply) => {
            const result = JSON.parse(reply.data);
            if (result.callbackId === 'child') {
              secpalTestResult.postMessage('child-reply');
            }
          };
          window.androidBridge.postMessage(JSON.stringify({callbackId:'child',pluginId:'SecPalEnterprise',methodName:'getManagedState',options:{}}));
          parent.postMessage('child-dispatched', '*');
        <\/script>`;
        document.body.append(frame);
      } else if (mode === "foreign") {
        window.addEventListener("message", (event) => {
          secpalTestResult.postMessage(`foreign-type:${event.data}`);
        });
        const frame = document.createElement("iframe");
        frame.sandbox = "allow-scripts";
        frame.srcdoc = `<script>parent.postMessage(typeof window.androidBridge, '*')<\/script>`;
        document.body.append(frame);
      } else if (mode === "legacy") {
        secpalTestResult.postMessage(
          `legacy-types:${[
            typeof window.CapacitorCookiesAndroidInterface,
            typeof window.CapacitorHttpAndroidInterface,
            typeof window.CapacitorSystemBarsAndroidInterface,
            typeof window.androidBridge.postMessageLegacy,
          ].join(",")}`
        );
      } else if (mode === "core") {
        const forbiddenPluginIds = [
          "CapacitorCookies",
          "CapacitorHttp",
          "WebView",
        ];
        const forbiddenHeadersAbsent = forbiddenPluginIds.every(
          (pluginId) =>
            !window.Capacitor.PluginHeaders.some(
              (header) => header.name === pluginId
            )
        );
        const systemBarsHeader = window.Capacitor.PluginHeaders.find(
          (header) => header.name === "SystemBars"
        );
        const systemBarsHeaderAbsent = systemBarsHeader === undefined;
        const forbiddenNativePluginsUnavailable = [
          ...forbiddenPluginIds,
          "SystemBars",
        ].every((pluginId) => !window.Capacitor.isPluginAvailable(pluginId));

        secpalTestResult.postMessage(
          `core-surface:${[
            forbiddenHeadersAbsent,
            systemBarsHeaderAbsent,
            forbiddenNativePluginsUnavailable,
          ].join(",")}`
        );

        const rawCalls = [
          [
            "CapacitorCookies",
            "setCookie",
            { key: "blocked", value: "blocked" },
          ],
          ["CapacitorHttp", "request", { url: "https://forbidden.invalid/" }],
          ["WebView", "setServerBasePath", { path: "/blocked" }],
          ["SystemBars", "setStyle", { style: "DARK" }],
          ["SystemBars", "addListener", { eventName: "blocked" }],
          ["SystemBars", "requestPermissions", {}],
        ];
        Promise.all(
          rawCalls.map(([pluginId, methodName, options]) =>
            window.Capacitor.nativePromise(pluginId, methodName, options).then(
              () => false,
              (error) =>
                error?.message === `unable to find plugin : ${pluginId}`
            )
          )
        ).then((missing) =>
          secpalTestResult.postMessage(`core-raw-missing:${missing.join(",")}`)
        );
      }
    </script>
  </body>
</html>
