apply plugin: 'com.android.application'
apply plugin: 'com.google.android.gms.oss-licenses-plugin'

def releaseVersionCodeEnv = System.getenv('SECPAL_ANDROID_VERSION_CODE')
def releaseVersionCodeString = (releaseVersionCodeEnv && releaseVersionCodeEnv.trim()) ? releaseVersionCodeEnv.trim() : '1'
def releaseVersionCode
try {
    releaseVersionCode = Integer.parseInt(releaseVersionCodeString)
} catch (NumberFormatException e) {
    throw new GradleException("Invalid SECPAL_ANDROID_VERSION_CODE environment variable value '${releaseVersionCodeEnv}'. Expected a numeric integer version code.")
}
def releaseVersionName = System.getenv('SECPAL_ANDROID_VERSION_NAME') ?: '1.0.0'
def releaseKeystorePath = System.getenv('SECPAL_ANDROID_KEYSTORE_PATH')
def releaseKeystorePassword = System.getenv('SECPAL_ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = System.getenv('SECPAL_ANDROID_KEY_ALIAS')
def releaseKeyPassword = System.getenv('SECPAL_ANDROID_KEY_PASSWORD')
def samsungAppKeyPttData = (System.getenv('SECPAL_ANDROID_SAMSUNG_APP_KEY_PTT_DATA') ?: '').trim()
def samsungAppKeySosData = (System.getenv('SECPAL_ANDROID_SAMSUNG_APP_KEY_SOS_DATA') ?: '').trim()
def hasReleaseSigning = releaseKeystorePath && releaseKeystorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "app.secpal"
    compileSdk rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }
    defaultConfig {
        applicationId "app.secpal"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode releaseVersionCode
        versionName releaseVersionName
        manifestPlaceholders = [
            secpalSamsungAppKeyPttData: samsungAppKeyPttData,
            secpalSamsungAppKeySosData: samsungAppKeySosData,
        ]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            buildConfigField "boolean", "ALLOW_SCREENSHOTS", "false"
        }
        release {
            minifyEnabled true
            shrinkResources true
            buildConfigField "boolean", "ALLOW_SCREENSHOTS", "false"
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
        storeListing {
            initWith debug
            debuggable true
            minifyEnabled false
            shrinkResources false
            applicationIdSuffix ".storelisting"
            matchingFallbacks = ['debug']
            buildConfigField "boolean", "ALLOW_SCREENSHOTS", "true"
        }
    }
    packaging {
        jniLibs {
            keepDebugSymbols += ['**/libdatastore_shared_counter.so']
        }
    }
}

tasks.withType(org.gradle.api.tasks.compile.JavaCompile).configureEach {
    if ((findProperty('secpalJavaDeprecationLint') ?: 'false').toBoolean()) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

tasks.register("verifyReleasePasskeyDependencies") {
    group = "verification"
    description = "Fails when the vulnerable Google Play services FIDO dependency reaches the release classpath."

    doLast {
        def forbiddenComponents = configurations.releaseRuntimeClasspath.incoming.resolutionResult.allComponents.findAll {
            it.moduleVersion.group == "com.google.android.gms" && it.moduleVersion.name == "play-services-fido"
        }

        if (!forbiddenComponents.isEmpty()) {
            throw new GradleException(
                "Release runtime classpath contains forbidden play-services-fido components: " +
                    forbiddenComponents.collect { it.moduleVersion }.join(", ")
            )
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation platform('com.google.firebase:firebase-bom:34.12.0')
    implementation 'com.google.firebase:firebase-common'
    implementation 'com.google.firebase:firebase-messaging'
    // This XML-view release is compatible with the Android 35/AGP 8.7
    // release toolchain used by this app; issue #336 tracks the toolchain upgrade.
    implementation 'com.google.android.gms:play-services-oss-licenses:17.2.2'
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.credentials:credentials:$androidxCredentialsVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.json:json:20240303"
    testImplementation "org.robolectric:robolectric:4.14.1"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'
